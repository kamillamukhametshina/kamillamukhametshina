<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CV Mindmap</title>
  <meta name="description" content="Стартовая сцена сайта-резюме в формате майндмэпа.">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="map-page">
    <section class="map-scene" aria-label="Интерактивная карта пути">
      <div class="hero-cluster" id="hero-cluster" tabindex="0" aria-label="Центральная точка карты">
        <div class="callout callout-career" aria-hidden="true">
          <span class="callout-text">Карьера</span>
          <img src="./assets/arrow-4.svg" alt="" class="callout-arrow">
        </div>

        <div class="callout callout-education" aria-hidden="true">
          <span class="callout-text">Образование</span>
          <img src="./assets/arrow-2.svg" alt="" class="callout-arrow">
        </div>

        <div class="callout callout-achievements" aria-hidden="true">
          <span class="callout-text">Достижения</span>
          <img src="./assets/arrow-3.svg" alt="" class="callout-arrow">
        </div>

        <div class="cluster-art" id="cluster-art" aria-hidden="true">
          <img src="./assets/elements/kam-k-transparent.png" alt="" class="fragment frag-k">
          <img src="./assets/elements/kam-a-transparent.png" alt="" class="fragment frag-a">
          <img src="./assets/elements/kam-m-transparent.png" alt="" class="fragment frag-m">
        </div>
      </div>
    </section>
  </main>

  <script src="./script.js"></script>
</body>
</html>
